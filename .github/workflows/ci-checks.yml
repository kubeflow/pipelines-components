---
# This workflow checks if all CI checks have passed and uploads PR context for label updates.
name: CI Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

jobs:
  check_ci_status:
    runs-on: ubuntu-24.04
    permissions:
      checks: read
      contents: read
      pull-requests: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Reset 'ci-passed' label on PR updates
        if: github.event.action == 'synchronize' || github.event.action == 'reopened'
        run: |
          echo "Removing stale 'ci-passed' label for event: ${{ github.event.action }}"
          gh pr edit "${{ github.event.pull_request.number }}" \
            --remove-label "ci-passed" \
            --repo "$GITHUB_REPOSITORY" || echo "Label not present"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for 'needs-ok-to-test' and 'ok-to-test' labels
        id: label_check
        run: |
          SHOULD_RUN=true
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'needs-ok-to-test') }}" == "true" && \
            "${{ contains(github.event.pull_request.labels.*.name, 'ok-to-test') }}" != "true" ]]; then
            echo "PR still requires '/ok-to-test'. Skipping CI check workflow."
            SHOULD_RUN=false
          else
            echo "PR is allowed to run CI check workflow."
          fi
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

      - name: Check if all CI checks passed
        if: steps.label_check.outputs.should_run == 'true'
        uses: wechuli/allcheckspassed@0b68b3b7d92e595bcbdea0c860d05605720cf479
        with:
          delay: '5'
          retries: '10'
          polling_interval: '5'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save PR payload
        if: steps.label_check.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p ./pr
          echo "${{ github.event.pull_request.number }}" > ./pr/pr_number
          echo "${{ github.event.action }}" > ./pr/event_action

      - name: Upload PR artifact
        if: steps.label_check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr
          path: pr/
