---
name: Scripts Unit Tests

on:
  push:
    paths-ignore:
      - '**/OWNERS'
  pull_request:
    paths:
      - '.github/scripts/**'
      - 'scripts/**'
      - 'test_data/**'
      - '.github/workflows/scripts-tests.yml'
      - '.github/actions/setup-python-ci/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  test-scripts:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
        scripts-dir:
          - .github/scripts
          - scripts

    name: Test ${{ matrix.scripts-dir }} (Python ${{ matrix.python-version }})

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests (${{ matrix.scripts-dir }})
        working-directory: ${{ matrix.scripts-dir }}
        shell: bash
        run: |
          if compgen -G "*/tests" > /dev/null; then
            uv run pytest */tests/ -v --tb=short -m "not gh_api"
          else
            echo "No */tests directories found under '${{ matrix.scripts-dir }}'; skipping."
          fi

  api-tests:
    runs-on: ubuntu-24.04
    name: API tests (.github/scripts)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: "3.13"

      - name: Run API tests
        working-directory: .github/scripts
        shell: bash
        run: |
          if compgen -G "*/tests" > /dev/null; then
            uv run pytest */tests/ -v --tb=short -m gh_api
          else
            echo "No */tests directories found; skipping."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
